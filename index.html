<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>J.A.R.V.I.S</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;width:100%;height:100%;background:radial-gradient(ellipse at 50% 50%,#081828 0%,#040e1a 30%,#020810 60%,#000 100%);font-family:'Courier New',monospace;color:rgba(140,200,255,0.85)}
canvas#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

#boot{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,#0a1e3a 0%,#040c1a 40%,#020a14 80%);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.5s}
#boot.done{opacity:0;pointer-events:none}
#boot-logo{font-size:38px;letter-spacing:20px;color:rgba(160,220,255,0.95);text-shadow:0 0 20px rgba(100,180,255,0.8),0 0 60px rgba(80,150,255,0.5),0 0 120px rgba(60,120,220,0.3),0 0 200px rgba(40,100,200,0.15);opacity:0;animation:logoIn 2s 0.5s forwards}
@keyframes logoIn{to{opacity:1}}
#boot-bar{width:280px;height:1px;background:rgba(100,180,255,0.1);margin-top:30px;overflow:hidden;opacity:0;animation:fadeIn 0.5s 1.5s forwards}
#boot-bar-fill{height:100%;width:0;background:rgba(120,180,255,0.6);box-shadow:0 0 8px rgba(100,170,255,0.4);transition:width 0.3s}
@keyframes fadeIn{to{opacity:1}}
#boot-lines{margin-top:25px;font-size:9px;color:rgba(140,200,255,0.5);line-height:2.2;width:360px;opacity:0;animation:fadeIn 0.5s 2s forwards}
#boot-lines div{opacity:0;transform:translateY(4px);transition:all 0.3s}
#boot-lines div.on{opacity:1;transform:translateY(0)}
#boot-pct{font-size:10px;color:rgba(140,200,255,0.3);margin-top:12px;letter-spacing:4px;opacity:0;animation:fadeIn 0.5s 2s forwards}

#hud{opacity:0;transition:opacity 1.2s;pointer-events:none}
#hud.show{opacity:1;pointer-events:auto}
#lock{position:fixed;inset:0;background:rgba(2,8,20,0.97);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.2s cubic-bezier(0.25,1,0.5,1);will-change:opacity,transform}
#lock.done{opacity:0;pointer-events:none;transform:scale(1.05)}
#lock-title{font-size:14px;letter-spacing:8px;color:rgba(140,200,255,0.7);margin-bottom:20px;transition:color 0.5s}
#lock-input{width:280px;padding:10px 16px;font-size:14px;font-family:inherit;background:rgba(5,15,30,0.9);border:1px solid rgba(80,160,255,0.2);border-radius:20px;color:#fff;outline:none;text-align:center;transition:border-color 0.3s,box-shadow 0.3s,transform 0.15s}
#lock-input:focus{border-color:rgba(100,170,255,0.5)}
#lock-input.shake{animation:shake 0.4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
#lock-status{margin-top:12px;font-size:10px;color:rgba(140,200,255,0.5);min-height:20px;transition:color 0.4s,opacity 0.4s}
#lock-status.fail{color:rgba(255,80,80,0.9)}
#lock-status.ok{color:rgba(100,255,180,0.9)}
#lock-attempts{margin-top:6px;font-size:8px;color:rgba(140,200,255,0.3)}
#lock.lockdown{background:rgba(40,0,0,0.98)}
#lock.lockdown #lock-title{color:rgba(255,50,50,0.9);animation:pulse-red 1s infinite}
@keyframes pulse-red{0%,100%{opacity:0.7}50%{opacity:1}}
#bloom{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(80,160,255,0.12) 0%,rgba(60,130,220,0.06) 20%,rgba(40,100,180,0.02) 40%,transparent 60%);z-index:1;pointer-events:none;animation:glow 4s ease-in-out infinite;will-change:transform,opacity}
@keyframes glow{0%,100%{opacity:0.8;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}}
#title{position:fixed;top:10px;left:50%;transform:translateX(-50%);font-size:13px;letter-spacing:12px;z-index:30;color:rgba(150,210,255,0.8);text-shadow:0 0 20px rgba(80,160,255,0.3)}
#status{position:fixed;top:30px;left:50%;transform:translateX(-50%);font-size:8px;z-index:30;letter-spacing:3px;display:flex;align-items:center;gap:7px;color:rgba(140,200,255,0.5)}
#dot{width:6px;height:6px;border-radius:50%;background:rgba(100,255,180,0.7);box-shadow:0 0 6px rgba(100,255,180,0.4)}
#clock{position:fixed;top:10px;right:14px;font-size:11px;z-index:30;text-align:right;color:rgba(140,200,255,0.5)}

.panel{position:fixed;z-index:20;font-size:9px;line-height:1.7;padding:8px 10px;border-radius:4px;background:rgba(5,15,30,0.7);border:1px solid rgba(80,160,255,0.08);backdrop-filter:blur(2px);opacity:0;transform:translateY(6px);transition:all 0.5s cubic-bezier(0.25,1,0.5,1);pointer-events:none;will-change:transform,opacity;max-height:130px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(80,160,255,0.15) transparent}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:rgba(80,160,255,0.2);border-radius:2px}
.panel.vis{opacity:1;transform:translateY(0);pointer-events:auto}
.pt{font-size:7px;letter-spacing:2px;margin-bottom:3px;color:rgba(130,195,255,0.7);border-bottom:1px solid rgba(80,160,255,0.06);padding-bottom:2px}

#p-sys{top:48px;left:10px;width:160px}
#p-brains{top:48px;right:10px;width:175px}
#p-prog{top:190px;left:10px;width:160px}
#p-feat{top:190px;right:10px;width:165px}
#p-goals{top:330px;left:10px;width:170px}
#p-comms{top:330px;right:10px;width:200px;max-height:110px}
#p-sched{display:none}
#p-voice{bottom:80px;left:10px;width:165px;max-height:110px}
#p-arch{bottom:80px;left:185px;width:165px;max-height:110px}
#p-stats{bottom:80px;right:10px;width:140px;max-height:110px}
#p-files{display:none}
#p-net{display:none}
#p-tasks{top:48px;left:50%;transform:translateX(-50%);width:180px}
#p-stocks{display:none}
#p-road{display:none}

@media(max-width:900px){
.panel{position:relative!important;top:auto!important;left:auto!important;right:auto!important;bottom:auto!important;width:100%!important;max-width:none!important;max-height:120px!important}
#hud{display:flex;flex-direction:column;overflow-y:auto;padding:45px 8px 65px;gap:6px}
#bloom{display:none}
}

.bar-bg{display:inline-block;height:3px;width:55px;background:rgba(80,160,255,0.06);border-radius:2px;vertical-align:middle;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;background:rgba(100,180,255,0.5);box-shadow:0 0 2px rgba(100,170,255,0.3);transition:width 0.5s}
.lb{display:inline-block;width:48px;font-size:8px}.pc{display:inline-block;width:22px;text-align:right;opacity:0.35;font-size:7px;margin-left:2px}
.on{color:rgba(100,255,180,0.8)}.off{color:rgba(255,120,80,0.7)}
.msg-u{color:rgba(200,210,220,0.45);margin-bottom:1px;font-size:8px;word-wrap:break-word}
.msg-j{color:rgba(140,200,255,0.6);margin-bottom:2px;font-size:8px;word-wrap:break-word}

#nav{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);z-index:40;display:flex;gap:4px}
.nb{font-size:7px;letter-spacing:1px;padding:3px 8px;border:1px solid rgba(80,160,255,0.12);border-radius:3px;color:rgba(140,200,255,0.4);cursor:pointer;transition:all 0.25s;background:rgba(5,15,30,0.5)}
.nb:hover,.nb.ac{color:rgba(150,210,255,0.85);border-color:rgba(80,160,255,0.3);background:rgba(40,80,130,0.15)}

#chat{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:0 20px 10px;background:rgba(3,10,20,0.92);border-top:1px solid rgba(80,160,255,0.06);display:flex;flex-direction:column;gap:0}
#chat-log{max-height:0;overflow-y:auto;padding:0;display:flex;flex-direction:column;gap:4px;scrollbar-width:thin;scrollbar-color:rgba(80,160,255,0.15) transparent;transition:max-height 0.3s ease,padding 0.3s ease}
#chat.open #chat-log{max-height:30vh;padding:10px 0 6px}
#chat-log::-webkit-scrollbar{width:3px}
#chat-log::-webkit-scrollbar-thumb{background:rgba(80,160,255,0.2);border-radius:2px}
.chat-msg{font-size:11px;padding:3px 9px;border-radius:10px;max-width:80%;word-wrap:break-word;animation:msgIn 0.3s ease}
.chat-msg.user{align-self:flex-end;background:rgba(60,130,200,0.12);color:rgba(180,220,255,0.85);border:1px solid rgba(80,160,255,0.1)}
.chat-msg.jarvis{align-self:flex-start;background:rgba(20,40,60,0.6);color:rgba(200,230,255,0.8);border:1px solid rgba(80,160,255,0.06)}
.chat-msg.jarvis.typing{opacity:0.6}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#chat-reply{display:none}
#chat-row{display:flex;align-items:center;gap:8px;width:100%;padding-top:6px}
#chat-input{flex:1;padding:10px 16px;font-size:14px;font-family:inherit;background:rgba(8,18,32,0.9);border:1px solid rgba(80,160,255,0.12);border-radius:20px;color:rgba(220,235,255,0.9);outline:none;transition:border-color 0.3s}
#chat-input:focus{border-color:rgba(100,170,255,0.4);box-shadow:0 0 10px rgba(80,150,255,0.08)}
#chat-input::placeholder{color:rgba(140,200,255,0.25);font-size:12px}
#chat-send{padding:9px 16px;font-size:10px;letter-spacing:2px;background:rgba(60,130,200,0.08);border:1px solid rgba(80,160,255,0.12);border-radius:16px;color:rgba(140,200,255,0.7);cursor:pointer;transition:all 0.2s;white-space:nowrap}
#chat-send:hover{background:rgba(60,130,200,0.15);border-color:rgba(100,170,255,0.4)}
#music-btn{position:fixed;top:10px;left:14px;z-index:30;font-size:8px;cursor:pointer;padding:3px 7px;border:1px solid rgba(80,160,255,0.1);border-radius:3px;color:rgba(140,200,255,0.4)}
#cam-box{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);z-index:25}
#cam-box video{width:160px;height:100px;border-radius:16px;object-fit:cover;opacity:0.8;transform:scaleX(-1);box-shadow:0 0 20px rgba(80,160,255,0.2),0 0 50px rgba(60,130,220,0.1);-webkit-mask-image:radial-gradient(ellipse 85% 85% at center,white 50%,transparent 100%);mask-image:radial-gradient(ellipse 85% 85% at center,white 50%,transparent 100%)}
</style>
</head><body>
<div id="boot"><div id="boot-logo">J.A.R.V.I.S</div><div id="boot-bar"><div id="boot-bar-fill"></div></div><div id="boot-lines"></div><div id="boot-pct">0%</div></div>
<div id="hud">
  <div id="lock" class="done"><div id="lock-title">AUTHENTICATION REQUIRED</div><input id="lock-input" type="password" placeholder="Enter passphrase..." autocomplete="off"><div id="lock-status"></div><div id="lock-attempts"></div><div id="lock-face" onclick="startFaceCheck()" style="margin-top:16px;font-size:9px;color:rgba(140,200,255,0.4);cursor:pointer;border:1px solid rgba(80,160,255,0.12);padding:4px 12px;border-radius:3px">USE FACE ID</div></div>
  <div id="bloom"></div>
  <div id="title">J.A.R.V.I.S</div>
  <div id="status"><span id="dot"></span><span id="stxt">STANDBY</span></div>
  <div id="clock"></div>
  <div id="music-btn" onclick="toggleMusic()">♪</div>
  <div id="cam-box"><video id="camFeed" autoplay playsinline muted></video></div>
  <div class="panel" id="p-sys"></div>
  <div class="panel" id="p-brains"></div>
  <div class="panel" id="p-prog"></div>
  <div class="panel" id="p-feat"></div>
  <div class="panel" id="p-goals"></div>
  <div class="panel" id="p-comms"></div>
  <div class="panel" id="p-sched"></div>
  <div class="panel" id="p-voice"></div>
  <div class="panel" id="p-arch"></div>
  <div class="panel" id="p-stats"></div>
  <div class="panel" id="p-files"></div>
  <div class="panel" id="p-net"></div>
  <div class="panel" id="p-tasks"></div>
  <div class="panel" id="p-stocks"></div>
  <div class="panel" id="p-road"></div>
  <div id="nav">
    <div class="nb ac" onclick="showG('all')">ALL</div>
    <div class="nb" onclick="showG('main')">MAIN</div>
    <div class="nb" onclick="showG('intel')">INTEL</div>
    <div class="nb" onclick="showG('infra')">INFRA</div>
    <div class="nb" onclick="showG('none')">HIDE</div>
  </div>
  <div id="chat"><div id="chat-log"></div><div id="chat-reply"></div><div id="chat-row"><input id="chat-input" placeholder="Ask Jarvis..." autocomplete="off"><div id="chat-send" onclick="sendChat()">SEND</div></div></div>
</div>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// BOOT
const bootMsgs=["[SYS] Kernel loading...","[MEM] Allocated 2.7GB","[NET] WiFi connected","[AI] Gemini 2.5 Flash — READY","[AI] Groq Whisper — ACTIVE","[TV] Samsung — LINKED","[HUD] Renderer — 60FPS","[SEC] Verified","[OK] Systems nominal."];
let bi=0;const bootEl=document.getElementById('boot-lines'),bootFill=document.getElementById('boot-bar-fill'),bootPct=document.getElementById('boot-pct');
function bootStep(){if(bi<bootMsgs.length){const d=document.createElement('div');d.textContent=bootMsgs[bi];bootEl.appendChild(d);requestAnimationFrame(()=>d.classList.add('on'));bootFill.style.width=Math.round((bi+1)/bootMsgs.length*100)+'%';bootPct.textContent=Math.round((bi+1)/bootMsgs.length*100)+'%';bi++;setTimeout(bootStep,200);}else setTimeout(endBoot,400);}
function endBoot(){document.getElementById('boot').classList.add('done');document.getElementById('hud').classList.add('show');unlock();}

// LOCK SYSTEM
const PASS='';
const KEYWORD='your_keyword';
const lockEl=document.getElementById('lock');
const lockInput=document.getElementById('lock-input');
const lockStatus=document.getElementById('lock-status');
const lockAttempts=document.getElementById('lock-attempts');
let attempts=0;let stage='pass';
lockInput.addEventListener('keydown',e=>{if(e.key==='Enter'){if(stage==='pass')checkPass();else if(stage==='keyword')checkKeyword();}});

function checkPass(){
  if(lockInput.value.toLowerCase()===PASS){
    lockStatus.className='ok';lockStatus.textContent='Password accepted. Type keyword to enter...';
    lockInput.value='';lockInput.type='text';lockInput.placeholder='Keyword...';
    lockAttempts.style.display='none';stage='keyword';
  }else{
    attempts++;lockInput.classList.add('shake');
    setTimeout(()=>lockInput.classList.remove('shake'),450);
    lockStatus.className='fail';lockInput.value='';
    if(attempts>=3){
      lockStatus.textContent='3 FAILED — FACE RECOGNITION REQUIRED';
      lockInput.style.display='none';lockAttempts.style.display='none';
      document.getElementById('lock-face').style.display='none';
      setTimeout(startFaceCheck,1000);
    }else{lockStatus.textContent='ACCESS DENIED';lockAttempts.textContent=`Attempt ${attempts}/3`;}
  }
}

function checkKeyword(){
  if(lockInput.value.toLowerCase().includes(KEYWORD)){
    lockStatus.className='ok';lockStatus.textContent='Verified. Welcome, sir.';
    lockInput.style.display='none';setTimeout(unlock,1000);
  }else{lockdown();}
}

function startFaceCheck(){
  lockStatus.className='';lockStatus.textContent='Scanning face...';
  lockInput.style.display='none';document.getElementById('lock-face').style.display='none';
  navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{
    setTimeout(()=>{stream.getTracks().forEach(t=>t.stop());
      lockStatus.className='ok';lockStatus.textContent='Face recognized. Welcome, sir.';
      setTimeout(unlock,1000);
    },3000);
  }).catch(()=>{lockStatus.className='fail';lockStatus.textContent='Camera denied — cannot verify.';});
}

function unlock(){lockEl.classList.add('done');setTimeout(()=>showG('all'),500);renderStatic();}

// Static render for public demo (no backend)
function renderStatic(){
  const n=new Date();
  document.getElementById('clock').innerHTML=n.toTimeString().slice(0,8)+`<br><span style="font-size:7px;opacity:0.35">${n.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'})}</span>`;
  document.getElementById('dot').style.background='rgba(100,255,180,0.8)';
  document.getElementById('stxt').textContent='ONLINE';
  document.getElementById('p-sys').innerHTML=`<div class="pt">SYSTEM</div>Platform: Linux (Debian)<br>Python 3.10+<br>Always-on service<br>─────<br><span class="on">●</span> Voice Engine<br><span class="on">●</span> HUD Server<br><span class="on">●</span> Watchdog<br><span class="on">●</span> Executor`;
  document.getElementById('p-brains').innerHTML=`<div class="pt">NEURAL CORES</div><span class="on">●</span> Gemini 2.5 Flash<br><span style="opacity:0.3;font-size:7px">Main brain — fast reasoning</span><br><span class="on">●</span> Claude (via OpenRouter)<br><span style="opacity:0.3;font-size:7px">Heavy tasks — deep code</span><br><span class="on">●</span> Groq Whisper<br><span style="opacity:0.3;font-size:7px">Speech-to-text — free</span>`;
  document.getElementById('p-prog').innerHTML=`<div class="pt">MODULES</div><span class="lb">Voice</span><span class="bar-bg"><span class="bar-fill" style="width:95%"></span></span><span class="pc">95%</span><br><span class="lb">Exec</span><span class="bar-bg"><span class="bar-fill" style="width:90%"></span></span><span class="pc">90%</span><br><span class="lb">HUD</span><span class="bar-bg"><span class="bar-fill" style="width:85%"></span></span><span class="pc">85%</span><br><span class="lb">Search</span><span class="bar-bg"><span class="bar-fill" style="width:80%"></span></span><span class="pc">80%</span>`;
  document.getElementById('p-feat').innerHTML=`<div class="pt">CAPABILITIES</div><span class="on">●</span> Shell (any command)<br><span class="on">●</span> Autonomous Code Exec<br><span class="on">●</span> File System Control<br><span class="on">●</span> Web Search<br><span class="on">●</span> Multi-Brain Routing<br><span class="on">●</span> Voice Control<br><span class="on">●</span> Self-Correcting Agent<br><span class="on">●</span> Proactive Alerts`;
  document.getElementById('p-goals').innerHTML='';
  document.getElementById('p-comms').innerHTML=`<div class="pt">EXAMPLE COMMS</div><div class="msg-u">▸ Install flask and write an API</div><div class="msg-j">◂ EXEC: installing flask, writing app.py, testing...</div><div class="msg-u">▸ What's using my RAM?</div><div class="msg-j">◂ SHELL: ps aux --sort=-%mem | head -5</div><div class="msg-u">▸ Organize my downloads</div><div class="msg-j">◂ FILE:organize:Downloads — sorted 24 files.</div>`;
  document.getElementById('p-voice').innerHTML=`<div class="pt">VOICE COMMANDS</div>"Hey Jarvis" — Wake<br>"Install [pkg]" — SHELL<br>"Write a script..." — EXEC<br>"List my files" — FILE<br>"Search for..." — Web<br>"Kill [process]" — SHELL<br>"Update system" — apt<br>"Git push" — SHELL`;
  document.getElementById('p-arch').innerHTML=`<div class="pt">ARCHITECTURE</div>Voice → Groq Whisper (STT)<br>→ Brain Router<br>→ Gemini / Claude<br>→ Command Parser<br>─────<br>SHELL: → subprocess<br>EXEC: → autonomous agent<br>FILE: → fs operations<br>→ edge-tts → Speaker`;
  document.getElementById('p-stats').innerHTML=`<div class="pt">PROJECT</div>Lines of Code: 6,200+<br>Dev Hours: 53+<br>Services: 6 running<br>Brains: 3 active<br>Built in: 5 days<br>Open source`;
  document.getElementById('p-tasks').innerHTML=`<div class="pt">LIVE TASKS</div><span style="opacity:0.85;font-size:8.5px">▸ EXEC: Deploy Flask API</span><br><span class="bar-bg" style="width:100px"><span class="bar-fill" style="width:88%"></span></span><span class="pc">88%</span><br><span style="opacity:0.85;font-size:8.5px">▸ SHELL: System Update</span><br><span class="bar-bg" style="width:100px"><span class="bar-fill" style="width:45%"></span></span><span class="pc">45%</span>`;
  // Hide panels with personal data
  document.getElementById('p-sched').innerHTML='';
  document.getElementById('p-files').innerHTML='';
  document.getElementById('p-net').innerHTML='';
  document.getElementById('p-stocks').innerHTML='';
  document.getElementById('p-road').innerHTML='';
}
setInterval(()=>{const n=new Date();document.getElementById('clock').innerHTML=n.toTimeString().slice(0,8)+`<br><span style="font-size:7px;opacity:0.35">${n.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'})}</span>`;},1000);

function lockdown(){
  lockEl.classList.add('lockdown');
  document.getElementById('lock-title').textContent='LOCKDOWN';
  lockStatus.className='fail';lockStatus.textContent='UNAUTHORIZED — SYSTEM LOCKED';
  lockInput.style.display='none';
}
let musicOn=false;
function toggleMusic(){}
setTimeout(bootStep,1800);

// === THREE.JS — CLEAN RADIANT HEXAGON ===
const scene=new THREE.Scene(),cam=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,100);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true,alpha:true,powerPreference:'high-performance'});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));cam.position.z=5;

// Center piece — wireframe icosahedron (no orb)
const coreIco=new THREE.Mesh(new THREE.IcosahedronGeometry(0.5,1),new THREE.MeshBasicMaterial({color:0x88ccff,wireframe:true,transparent:true,opacity:0.4}));
scene.add(coreIco);
const coreIco2=new THREE.Mesh(new THREE.IcosahedronGeometry(0.35,0),new THREE.MeshBasicMaterial({color:0xaaddff,wireframe:true,transparent:true,opacity:0.25}));
scene.add(coreIco2);

// Hexagon flat rings — clean lines
function hexPts(r){const p=[];for(let i=0;i<=6;i++){const a=i*Math.PI*2/6-Math.PI/2;p.push(new THREE.Vector3(Math.cos(a)*r,Math.sin(a)*r,0));}return p;}
const hexes=[];
[{r:0.5,op:0.4},{r:0.8,op:0.5},{r:1.1,op:0.4},{r:1.5,op:0.3},{r:1.9,op:0.2},{r:2.3,op:0.1}].forEach(h=>{

// Cinematic progress bar animation — ticks up fast like Iron Man HUD
function animateBar(bar,pctEl,from,to){
  const duration=Math.abs(to-from)*15;// ~15ms per percent = fast tick-up
  const start=performance.now();
  function step(now){
    const elapsed=now-start;
    const progress=Math.min(elapsed/Math.max(duration,1),1);
    // Ease-out cubic for that smooth deceleration at end
    const eased=1-Math.pow(1-progress,3);
    const current=from+(to-from)*eased;
    bar.style.width=current.toFixed(1)+'%';
    if(pctEl)pctEl.textContent=Math.round(current)+'%';
    // Glow effect when actively changing
    if(progress<1){
      bar.style.boxShadow=`0 0 ${4+progress*6}px rgba(100,180,255,${0.4+progress*0.3})`;
      requestAnimationFrame(step);
    }else{
      bar.style.width=to+'%';
      if(pctEl)pctEl.textContent=to+'%';
      bar.style.boxShadow='0 0 2px rgba(100,170,255,0.3)';
    }
  }
  requestAnimationFrame(step);
}

function saveChatMsg(role,text){
  try{
    const h=JSON.parse(localStorage.getItem('jarvis_chat')||'[]');
    h.push({role,text,ts:Date.now()});
    if(h.length>100)h.splice(0,h.length-100);
    localStorage.setItem('jarvis_chat',JSON.stringify(h));
  }catch(e){}
}

function addChatMsg(role,text,isTyping){
  const d=document.createElement('div');
  d.className='chat-msg '+role+(isTyping?' typing':'');
  d.textContent=text;
  chatLog.appendChild(d);
  chatLog.scrollTop=chatLog.scrollHeight;
  return d;
}

function typeReply(text){
  typing=true;
  document.getElementById('chat').classList.add('open');
  const el=addChatMsg('jarvis','',true);
  const words=text.split(' ');let i=0;
  function next(){
    if(i>=words.length){el.classList.remove('typing');typing=false;saveChatMsg('jarvis',text);return;}
    el.textContent+=(i>0?' ':'')+words[i];i++;
    chatLog.scrollTop=chatLog.scrollHeight;
    setTimeout(next,60+Math.random()*40);
  }
  next();
}

// Emotion visual system — changes HUD color/speed like MCU Jarvis
function applyEmotion(e){
  // Change dot color
  document.getElementById('dot').style.background=e.dot;
  // Change title glow
  const title=document.getElementById('title');
  title.style.color=e.color;title.style.textShadow=`0 0 20px ${e.glow}`;
  // Change bloom
  const bloom=document.getElementById('bloom');
  const baseColor=e.color.replace(/[\d.]+\)$/,'0.12)');
  bloom.style.background=`radial-gradient(circle,${baseColor} 0%,transparent 60%)`;
  // Speed up/slow down Three.js animations
  window._emotionSpeed=e.speed||1.0;
  // Panel border tint
  document.querySelectorAll('.panel').forEach(p=>{
    p.style.borderColor=e.glow.replace(/[\d.]+\)$/,'0.12)');

  document.getElementById('stxt').style.color=e.color;
